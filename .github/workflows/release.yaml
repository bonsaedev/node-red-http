name: Release
on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Run in dry-run mode (no publish)"
        required: false
        type: boolean
        default: false

permissions:
  packages: write
  pull-requests: write
  contents: write
  issues: write
  id-token: write
  attestations: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    env:
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
      NODE_OPTIONS: "--no-warnings"
      NPM_CONFIG_UNICODE: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.11.0
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install
        env:
          HUSKY: 0

      - name: Type Check
        run: pnpm validate:tsc

      - name: Lint
        run: pnpm validate:lint

      - name: Format Check
        run: pnpm validate:format

      - name: Server Unit Tests
        run: pnpm test:server:unit

      - name: Server Integration Tests
        run: pnpm test:server:integration

      - name: Build
        run: pnpm build

      - name: Zip dist
        run: zip -r dist.zip dist

      - name: Attest
        if: ${{ !inputs.dry-run }}
        uses: actions/attest-build-provenance@v2.3.0
        with:
          subject-path: "dist/**/*"

      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@v4.1.1
        with:
          dry_run: ${{ inputs.dry-run }}
        env:
          HUSKY: 0
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist.zip
